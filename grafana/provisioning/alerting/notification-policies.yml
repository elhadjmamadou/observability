apiVersion: 1

policies:
  - orgId: 1
    receiver: email-alerts
    group_by: ["alertname", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

    routes:
      # Alertes critiques → email + Telegram immédiatement
      - receiver: telegram-alerts
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
        continue: true   # continue → aussi envoyé à email-alerts

      # Alertes warning → email seulement
      - receiver: email-alerts
        matchers:
          - severity = warning
        repeat_interval: 4h

      # Alertes info → email, moins fréquent
      - receiver: email-alerts
        matchers:
          - severity = info
        repeat_interval: 24h
