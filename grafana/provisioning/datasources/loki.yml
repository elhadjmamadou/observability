apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Lien depuis les logs Django vers les traces (futur)
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: ""
