server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Lecture directe des fichiers de logs JSON Docker (compatible Docker API < 1.44)
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Les logs Docker sont stockés en JSON : {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      # Extraction du nom du conteneur depuis le chemin du fichier
      # /var/lib/docker/containers/<id>/<id>-json.log → label "container_id"
      - regex:
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/[^/]+-json\.log'
          source: filename
      - labels:
          stream:
          container_id:
      - output:
          source: output
      - timestamp:
          source: timestamp
          format: RFC3339Nano
