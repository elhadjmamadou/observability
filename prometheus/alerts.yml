groups:
  # ── API / Infrastructure ────────────────────────────────────────────────
  - name: freejobgn_api
    rules:
      - alert: APIDown
        expr: up{job="freejobgn-django"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API Django inaccessible"
          description: "Prometheus ne peut plus scraper /metrics depuis 2 minutes. L'API est probablement en down."

      - alert: HighErrorRate5xx
        expr: >
          100 * sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
          / sum(rate(django_http_responses_total_by_status_total[5m])) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreur 5xx > 1%"
          description: "{{ $value | printf \"%.2f\" }}% des requêtes retournent des 5xx depuis 5 minutes."

      - alert: HighLatencyP95
        expr: >
          histogram_quantile(0.95,
            sum by (le) (rate(django_http_requests_latency_seconds_by_view_method_total_bucket[5m]))
          ) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence P95 > 1 seconde"
          description: "Le 95ème percentile de latence dépasse 1s depuis 5 minutes."

  # ── Paiements ───────────────────────────────────────────────────────────
  - name: freejobgn_payments
    rules:
      - alert: PaymentFailuresSpike
        expr: increase(freejobgn_payment_transactions_total{status="FAILED"}[10m]) > 3
        labels:
          severity: critical
        annotations:
          summary: "Pic d'échecs de paiement Djomy"
          description: "Plus de 3 paiements ont échoué en 10 minutes."

      - alert: WebhookInvalidSignature
        expr: freejobgn_webhooks_total{state="invalid_signature"} > 0
        labels:
          severity: warning
        annotations:
          summary: "Webhooks Djomy avec signature invalide"
          description: "{{ $value }} webhook(s) avec signature invalide détectés. Vérifier DJOMY_WEBHOOK_SECRET."

  # ── Abonnements ─────────────────────────────────────────────────────────
  - name: freejobgn_subscriptions
    rules:
      - alert: NoNewActiveSubscriptions
        expr: delta(freejobgn_subscriptions_total{status="active"}[24h]) == 0
        for: 24h
        labels:
          severity: info
        annotations:
          summary: "Aucun nouvel abonnement actif depuis 24h"
          description: "Aucun abonnement n'est passé au statut actif depuis 24 heures."

  # ── Serveur (Node Exporter) ─────────────────────────────────────────────
  - name: freejobgn_infrastructure
    rules:
      - alert: DiskSpaceLow
        expr: >
          (
            node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"}
          ) < 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Espace disque < 20%"
          description: "{{ $value | humanizePercentage }} d'espace disque disponible. Nettoyer les images Docker (docker system prune)."

      - alert: DiskSpaceCritical
        expr: >
          (
            node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"}
          ) < 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Espace disque CRITIQUE < 5%"
          description: "Moins de 5% d'espace disque. Le serveur risque de tomber."

      - alert: HighCPUUsage
        expr: >
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 85% depuis 10 minutes"
          description: "{{ $value | printf \"%.1f\" }}% d'utilisation CPU sur {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: >
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM > 90% utilisée"
          description: "{{ $value | humanizePercentage }} de RAM utilisée."

  # ── Celery ──────────────────────────────────────────────────────────────
  - name: freejobgn_celery
    rules:
      - alert: CeleryTaskFailuresHigh
        expr: freejobgn_celery_tasks_total{status="FAILURE"} > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Plus de 10 tâches Celery en échec"
          description: "{{ $value }} tâches Celery en statut FAILURE. Vérifier les logs worker."

  # ── RabbitMQ ────────────────────────────────────────────────────────────
  - name: freejobgn_rabbitmq
    rules:
      - alert: RabbitMQQueueDepthHigh
        expr: rabbitmq_queue_messages_ready > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "File RabbitMQ > 1000 messages"
          description: "{{ $value }} messages en attente dans RabbitMQ. Le worker Celery traite trop lentement."

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  - name: freejobgn_postgres
    rules:
      - alert: PostgresqlDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL inaccessible"
          description: "L'exporter PostgreSQL ne peut plus se connecter à la base de données."

      - alert: PostgresqlLowCacheHitRatio
        expr: >
          pg_stat_database_blks_hit{datname="freejobgn"}
          / (pg_stat_database_blks_hit{datname="freejobgn"} + pg_stat_database_blks_read{datname="freejobgn"})
          < 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit ratio PostgreSQL < 90%"
          description: "{{ $value | humanizePercentage }} de cache hit ratio. Envisager d'augmenter shared_buffers."

      - alert: PostgresqlTooManyConnections
        expr: >
          pg_stat_activity_count > (pg_settings_max_connections * 0.80)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL > 80% des connexions utilisées"
          description: "{{ $value }} connexions actives sur {{ $labels.instance }}."
