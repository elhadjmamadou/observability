global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "freejobgn"
    env: "development"

# Chargement des règles d'alerte
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Django tourne en dehors de Docker en dev (python manage.py runserver)
  - job_name: "freejobgn-django"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Node Exporter (optionnel en dev)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # PostgreSQL Exporter
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # RabbitMQ Exporter
  - job_name: "rabbitmq-exporter"
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]

  # Prometheus lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
